<!DOCTYPE html>
<html>
<head>
    <title>检查localStorage</title>
</head>
<body>
    <h1>检查localStorage</h1>
    <div id="result"></div>
    
    <script>
        const resultDiv = document.getElementById('result');
        
        // 检查localStorage中的token
        const token = localStorage.getItem('token');
        const userInfo = localStorage.getItem('userInfo');
        
        let result = '<h2>localStorage内容：</h2>';
        result += `<p>Token: ${token ? '存在' : '不存在'}</p>`;
        result += `<p>User Info: ${userInfo ? '存在' : '不存在'}</p>`;
        
        if (userInfo) {
            try {
                const parsedUserInfo = JSON.parse(userInfo);
                result += '<h3>用户信息：</h3>';
                result += `<p>ID: ${parsedUserInfo.id}</p>`;
                result += `<p>用户名: ${parsedUserInfo.username}</p>`;
                result += `<p>邮箱: ${parsedUserInfo.email}</p>`;
                result += `<p>是否管理员: ${parsedUserInfo.is_admin}</p>`;
            } catch (e) {
                result += `<p>用户信息解析失败: ${e.message}</p>`;
            }
        }
        
        resultDiv.innerHTML = result;
    </script>
</body>
</html>
